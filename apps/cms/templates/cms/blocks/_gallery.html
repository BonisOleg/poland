{% load i18n %}
{% if gallery_items %}
<section class="cms-block cms-block--gallery event-gallery event-gallery--photo"{% if block.css_anchor %} id="{{ block.css_anchor }}"{% endif %} aria-label="{% trans 'Galeria zdjęć' %}">
    {% if block.heading %}<h2 class="event-gallery__title">{{ block.heading }}</h2>{% endif %}
    <div class="event-gallery__carousel-wrap">
        <button class="event-gallery__arrow event-gallery__arrow--prev" aria-label="{% trans 'Poprzednie' %}" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="event-gallery__carousel-viewport">
            <div class="event-gallery__carousel" data-carousel>
                {% for item in gallery_items %}
                    {% if item.src %}
                    <button type="button" class="event-gallery__thumb-btn" data-lightbox-src="{{ item.src }}" data-lightbox-alt="{{ item.alt_text|default:block.heading }}" aria-label="{% trans 'Powiększ zdjęcie' %}">
                        <img src="{{ item.src }}" alt="{{ item.alt_text|default:block.heading }}" class="event-gallery__thumb" loading="lazy">
                    </button>
                    {% endif %}
                {% endfor %}
            </div>
        </div>
        <button class="event-gallery__arrow event-gallery__arrow--next" aria-label="{% trans 'Następne' %}" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>
    <div class="event-gallery__dots" aria-hidden="true"></div>
</section>
{% endif %}
