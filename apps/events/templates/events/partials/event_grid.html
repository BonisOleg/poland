{% load i18n %}
<div class="grid grid--cards">
    {% for ec in page_obj %}
        {% include "components/event_card.html" %}
    {% empty %}
        <p class="text-gray text-center grid__empty">
            {% trans "Nie znaleziono wydarzeń pasujących do filtrów." %}
        </p>
    {% endfor %}
</div>

{% if page_obj.has_next %}
<div class="text-center mt-xl">
    <button class="btn btn--outline"
            hx-get="{% url 'events:filter' %}?page={{ page_obj.next_page_number }}"
            hx-target="#events-grid"
            hx-swap="innerHTML"
            hx-include=".filter-bar__select">
        {% trans "Więcej wydarzeń" %}
    </button>
</div>
{% endif %}
